<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: #334155; background: #ffffff; line-height: 1.6; }
  h1, h2, h3, h4, h5 { font-family: 'Playfair Display', Georgia, serif; color: #0f172a; font-weight: 700; }
  a { color: #1e3a5f; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }
  img { max-width: 100%; }
  input, select, textarea, button { font-family: inherit; font-size: inherit; }

  :root {
    --navy-900: #0c1929; --navy-800: #0f2440; --navy-700: #1e3a5f; --navy-600: #2a4f7a;
    --navy-500: #3b6998; --navy-400: #5a8ab5; --navy-300: #89b3d6; --navy-200: #bdd4ea;
    --navy-100: #e3eef7; --navy-50: #f0f5fa;
    --gold-600: #b8860b; --gold-500: #d4a017; --gold-400: #e8b92f; --gold-300: #f0cc5b;
    --gold-200: #f7de8a; --gold-100: #fdf3d0; --gold-50: #fefbee;
    --teal-700: #0f766e; --teal-600: #0d9488; --teal-500: #14b8a6; --teal-400: #2dd4bf; --teal-100: #ccfbf1;
    --green-600: #16a34a; --green-100: #dcfce7;
    --red-600: #dc2626; --red-100: #fee2e2;
    --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0; --slate-300: #cbd5e1;
    --slate-400: #94a3b8; --slate-500: #64748b; --slate-600: #475569; --slate-700: #334155;
    --slate-800: #1e293b; --slate-900: #0f172a;
    --max-width: 1200px; --radius: 8px; --radius-lg: 12px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
    --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
    --shadow-xl: 0 20px 25px rgba(0,0,0,.1), 0 8px 10px rgba(0,0,0,.04);
  }

  .container { max-width: var(--max-width); margin: 0 auto; padding: 0 24px; }
  .section { padding: 80px 0; }
  .section-alt { background: var(--slate-50); }
  .section-dark { background: linear-gradient(135deg, var(--navy-900), var(--navy-800)); color: #fff; }
  .section-dark h2, .section-dark h3 { color: #fff; }
  .section-title { font-size: 32px; margin-bottom: 8px; }
  .section-subtitle { color: var(--slate-500); margin-bottom: 48px; font-size: 17px; }
  .text-center { text-align: center; }
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; }
  .gap-8 { gap: 8px; } .gap-16 { gap: 16px; } .gap-24 { gap: 24px; } .gap-32 { gap: 32px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; } .mt-32 { margin-top: 32px; } .mt-48 { margin-top: 48px; }
  .mb-16 { margin-bottom: 16px; } .mb-24 { margin-bottom: 24px; } .mb-32 { margin-bottom: 32px; }
  .hidden { display: none !important; }

  .btn { display: inline-block; padding: 12px 28px; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all .25s ease; text-align: center; }
  .btn-primary { background: linear-gradient(135deg, var(--navy-700), var(--navy-800)); color: #fff; border-color: var(--navy-700); box-shadow: 0 2px 4px rgba(15,36,64,.3); }
  .btn-primary:hover { background: linear-gradient(135deg, var(--navy-600), var(--navy-700)); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,36,64,.3); text-decoration: none; }
  .btn-secondary { background: transparent; color: var(--navy-700); border-color: var(--navy-700); }
  .btn-secondary:hover { background: var(--navy-700); color: #fff; text-decoration: none; }
  .btn-gold { background: linear-gradient(135deg, var(--gold-500), var(--gold-600)); color: #fff; border-color: var(--gold-500); box-shadow: 0 2px 4px rgba(212,160,23,.3); }
  .btn-gold:hover { background: linear-gradient(135deg, var(--gold-400), var(--gold-500)); transform: translateY(-1px); text-decoration: none; }
  .btn-outline-light { background: transparent; color: #fff; border-color: rgba(255,255,255,.5); }
  .btn-outline-light:hover { background: #fff; color: var(--navy-800); border-color: #fff; text-decoration: none; }
  .btn-danger { background: var(--red-600); color: #fff; border-color: var(--red-600); }
  .btn-sm { padding: 8px 18px; font-size: 13px; }
  .btn-lg { padding: 16px 36px; font-size: 17px; }
  .btn-block { display: block; width: 100%; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  .card { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius-lg); overflow: hidden; transition: all .3s ease; box-shadow: var(--shadow-sm); }
  .card:hover { border-color: var(--navy-200); box-shadow: var(--shadow-lg); transform: translateY(-4px); }
  .card-body { padding: 20px; }
  .card-clickable { cursor: pointer; }

  .placeholder-img { background: linear-gradient(135deg, var(--navy-100), var(--slate-200)); display: flex; align-items: center; justify-content: center; color: var(--navy-400); font-size: 14px; font-style: italic; min-height: 180px; position: relative; overflow: hidden; }
  .placeholder-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,.3) 50%, transparent 60%); pointer-events: none; }
  .placeholder-img:has(img)::after { display: none; }

  .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .badge-dark { background: var(--navy-800); color: var(--gold-300); }
  .badge-light { background: var(--navy-50); color: var(--navy-700); }
  .badge-gold { background: var(--gold-100); color: var(--gold-600); }
  .badge-teal { background: var(--teal-100); color: var(--teal-700); }
  .badge-green { background: var(--green-100); color: var(--green-600); }

  .stars { color: var(--gold-500); font-size: 14px; letter-spacing: 2px; }
  .stars-lg { font-size: 20px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--navy-400), var(--navy-600)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .avatar-lg { width: 80px; height: 80px; font-size: 16px; }
  .avatar-xl { width: 120px; height: 120px; font-size: 20px; border: 4px solid var(--gold-300); }

  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: var(--slate-700); }
  .form-group .hint { font-size: 12px; color: var(--slate-400); }
  .input { width: 100%; padding: 11px 16px; border: 1.5px solid var(--slate-300); border-radius: var(--radius); font-size: 15px; background: #fff; color: var(--slate-700); transition: all .2s; }
  .input:focus { outline: none; border-color: var(--navy-500); box-shadow: 0 0 0 3px rgba(59,105,152,.15); }
  select.input { appearance: auto; }

  .breadcrumb { font-size: 13px; color: var(--slate-400); margin-bottom: 16px; }
  .breadcrumb a { color: var(--navy-500); cursor: pointer; }
  .breadcrumb span { margin: 0 6px; }
  .divider { border: none; border-top: 1px solid var(--slate-200); margin: 24px 0; }
  .inline-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .alert { padding: 14px 20px; border-radius: var(--radius); font-size: 14px; margin-bottom: 20px; }
  .alert-error { background: var(--red-100); color: var(--red-600); border: 1px solid #fca5a5; }
  .alert-success { background: var(--green-100); color: var(--green-600); border: 1px solid #86efac; }
  .alert-warn { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }

  /* ── Course administration modal ────────────────────────── */
  .admin-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--slate-500); cursor: pointer; opacity: .75; transition: opacity .15s, color .15s; text-decoration: none; border: 1px dashed var(--slate-300); padding: 6px 12px; border-radius: var(--radius); background: transparent; }
  .admin-link:hover { opacity: 1; color: var(--navy-700); border-color: var(--navy-300, #94a3b8); }
  .admin-link::before { content: '\u2699'; font-size: 14px; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,36,64,.55); display: flex; align-items: center; justify-content: center; z-index: 9000; padding: 20px; }
  .modal-card { background: #fff; border-radius: var(--radius-lg); max-width: 620px; width: 100%; max-height: 90vh; overflow: auto; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
  .modal-card-wide { max-width: 860px; }
  .modal-head { padding: 20px 28px 16px; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; justify-content: space-between; }
  .modal-head h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--navy-800); margin: 0; }
  .modal-head button { background: transparent; border: none; font-size: 22px; color: var(--slate-500); cursor: pointer; line-height: 1; padding: 4px 8px; }
  .modal-body { padding: 24px 28px; color: var(--slate-600); font-size: 14px; line-height: 1.6; }
  .modal-body p { margin: 0 0 14px; }
  .modal-foot { padding: 16px 28px 24px; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; border-top: 1px solid var(--slate-200); background: #fafbfd; border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
  .claim-list { list-style: none; padding: 0; margin: 12px 0 0; border: 1px solid var(--slate-200); border-radius: var(--radius); max-height: 260px; overflow: auto; }
  .claim-list li { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--slate-200); font-size: 13px; }
  .claim-list li:last-child { border-bottom: none; }
  .claim-list li label { display: flex; gap: 10px; cursor: pointer; width: 100%; }
  .claim-list li input[type=checkbox] { margin-top: 3px; }
  .claim-list .pill { font-size: 10px; padding: 2px 8px; border-radius: 999px; background: var(--slate-100, #f1f5f9); color: var(--slate-500); margin-left: 6px; }

  .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--slate-200); border-top-color: var(--navy-700); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .page-loader { display: flex; align-items: center; justify-content: center; min-height: 400px; }
  .page-loader .loading-spinner { width: 40px; height: 40px; border-width: 3px; }

  /* Header */
  .site-header { background: rgba(255,255,255,.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--slate-200); padding: 0 24px; height: 72px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .site-header .logo { font-family: 'Playfair Display', Georgia, serif; font-size: 24px; font-weight: 800; color: var(--navy-800); letter-spacing: -0.5px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }
  .site-header .logo svg { width: 32px; height: 32px; flex-shrink: 0; border-radius: 4px; }
  .site-header .logo em { font-style: normal; color: var(--gold-500); }
  .site-header nav { display: flex; gap: 32px; }
  .site-header nav a { font-size: 15px; color: var(--slate-600); font-weight: 500; transition: color .2s; cursor: pointer; }
  .site-header nav a:hover { color: var(--navy-700); text-decoration: none; }
  .site-header .header-actions { display: flex; align-items: center; gap: 12px; }

  /* Language Selector */
  .lang-selector { position: relative; }
  .lang-btn { background: none; border: 1px solid var(--slate-200); cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius); font-size: 14px; transition: all .2s; }
  .lang-btn:hover { border-color: var(--navy-300); background: var(--slate-50); }
  .lang-btn .flag { font-size: 20px; line-height: 1; }
  .lang-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); min-width: 180px; padding: 6px 0; display: none; z-index: 300; }
  .lang-dropdown.open { display: block; }
  .lang-dropdown a { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 14px; color: var(--slate-600); transition: background .2s; cursor: pointer; }
  .lang-dropdown a:hover { background: var(--slate-50); text-decoration: none; }
  .lang-dropdown a.active { background: var(--navy-50); color: var(--navy-700); font-weight: 600; }
  .lang-dropdown .flag { font-size: 20px; }

  /* User menu */
  .user-menu { position: relative; }
  .user-menu-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: var(--radius); transition: background .2s; }
  .user-menu-btn:hover { background: var(--slate-50); }
  .user-menu-dropdown { position: absolute; top: 100%; right: 0; background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius); box-shadow: var(--shadow-lg); min-width: 200px; padding: 8px 0; display: none; z-index: 200; }
  .user-menu-dropdown.open { display: block; }
  .user-menu-dropdown a { display: block; padding: 10px 16px; font-size: 14px; color: var(--slate-600); transition: background .2s; }
  .user-menu-dropdown a:hover { background: var(--slate-50); text-decoration: none; }
  .user-menu-dropdown hr { border: none; border-top: 1px solid var(--slate-100); margin: 4px 0; }

  /* Footer */
  .site-footer { background: linear-gradient(135deg, var(--navy-900), #0a1420); color: var(--slate-400); padding: 72px 0 32px; }
  .site-footer h4 { color: #fff; font-size: 16px; margin-bottom: 16px; }
  .site-footer a { color: var(--slate-400); font-size: 14px; display: block; margin-bottom: 10px; transition: color .2s; cursor: pointer; }
  .site-footer a:hover { color: var(--gold-400); text-decoration: none; }
  .footer-bottom { border-top: 1px solid rgba(255,255,255,.1); margin-top: 48px; padding-top: 24px; text-align: center; font-size: 13px; }

  /* Course card */
  .course-card .placeholder-img { min-height: 160px; }
  .course-card .card-body { padding: 18px; }
  .course-card .card-category { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--teal-600); margin-bottom: 8px; font-weight: 600; }
  .course-card .card-title { font-family: 'Playfair Display', Georgia, serif; font-size: 17px; color: var(--navy-800); margin-bottom: 8px; line-height: 1.3; }
  .course-card .card-instructor { font-size: 13px; color: var(--slate-500); margin-bottom: 10px; cursor: pointer; }
  .course-card .card-instructor:hover { color: var(--navy-700); }
  .course-card .card-meta { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
  .course-card .card-price { font-weight: 700; color: var(--navy-800); font-size: 18px; }
  .course-card .card-price-old { text-decoration: line-through; color: var(--slate-400); font-size: 14px; font-weight: 400; margin-left: 6px; }

  /* Catalog */
  .catalog-layout { display: flex; flex-direction: column; gap: 24px; }
  .filter-bar { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius-lg); padding: 16px 20px; box-shadow: var(--shadow-sm); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .filter-bar .filter-select { padding: 9px 14px; border: 1.5px solid var(--slate-300); border-radius: var(--radius); font-size: 14px; background: #fff; color: var(--slate-700); cursor: pointer; min-width: 150px; transition: all .2s; appearance: auto; }
  .filter-bar .filter-select:focus { outline: none; border-color: var(--navy-500); box-shadow: 0 0 0 3px rgba(59,105,152,.15); }
  .filter-bar .filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--slate-400); font-weight: 600; display: block; margin-bottom: 3px; }
  .filter-bar .filter-item { display: flex; flex-direction: column; }
  .filter-bar .filter-clear { font-size: 13px; color: var(--slate-500); cursor: pointer; margin-left: auto; padding: 8px 14px; border: 1px solid var(--slate-200); border-radius: var(--radius); transition: all .2s; background: none; }
  .filter-bar .filter-clear:hover { border-color: var(--red-600); color: var(--red-600); background: var(--red-100); }
  .active-filters { display: flex; flex-wrap: wrap; gap: 8px; }
  .active-filter-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--navy-50); color: var(--navy-700); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .active-filter-tag .remove { cursor: pointer; opacity: .6; font-size: 14px; }
  .active-filter-tag .remove:hover { opacity: 1; }
  .filter-sidebar { display: none; } /* deprecated but kept for safety */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 40px; }
  .pagination button { width: 40px; height: 40px; border: 1px solid var(--slate-300); background: #fff; border-radius: var(--radius); cursor: pointer; font-size: 14px; color: var(--slate-600); transition: all .2s; }
  .pagination button.active { background: var(--navy-700); color: #fff; border-color: var(--navy-700); }
  .pagination button:hover:not(.active) { border-color: var(--navy-500); color: var(--navy-700); }

  /* Detail */
  .course-detail-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; align-items: start; }
  .pricing-sidebar { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius-lg); padding: 28px; position: sticky; top: 96px; box-shadow: var(--shadow-md); }
  .pricing-sidebar .price-main { font-size: 38px; font-weight: 700; color: var(--navy-800); font-family: 'Playfair Display', Georgia, serif; }
  .pricing-sidebar .price-old { font-size: 18px; text-decoration: line-through; color: var(--slate-400); margin-left: 8px; }

// Real Supabase Auth client (email/password + magic link confirmation).
// Sessions are persisted by supabase-js in its own localStorage key.
//
// NOTE: must NOT be named `supabase` — the supabase-js UMD bundle declares
// `var supabase = ...` at top level, which becomes a global VarName in a
// classic <script>. A local `const supabase` would then throw a parse-time
// SyntaxError ("Identifier 'supabase' has already been declared") and the
// entire inline script would fail to run, leaving the page blank. This bit
// us 2026-04-11 after a floating @supabase/supabase-js@2 tag resolved to
// 2.103.0 and shipped the UMD bundle. Use `sbClient` instead.
const sbClient = window.supabase.createClient(SB_HOST, SB_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

// state.user  — row from public.users (integer id, first/last/role, etc.)
// state.session — Supabase Auth session (access_token, refresh_token, user.email)
// state.token — mirror of session.access_token, kept for legacy code paths
const state = { user: null, token: null, session: null, pendingEmail: null };

// Fetch the calling user's full profile row via the get_my_profile
// SECURITY DEFINER RPC (Phase 4d). We used to do a direct
// SELECT id,email,... FROM users WHERE auth_id = self, but after Phase 4d
// the column-level SELECT grant on public.users no longer includes
// email / is_premium / premium_expires_at / auth_id / created_at — those
// can only be read through this RPC, which checks auth.uid() server-side.
// The return shape is the same object the old SELECT used to build, so
// the rest of the app keeps reading state.user.{first_name,email,role,
// is_premium,premium_tier,...} unchanged.
async function loadPublicUser() {
  if (!state.session) { state.user = null; return; }
  try {
    state.user = await rpc('get_my_profile');
  } catch (e) { console.warn('loadPublicUser failed', e); state.user = null; }
}

// Called on boot and on every auth state change (sign-in, sign-out, token refresh).
async function onAuthSession(session) {
  state.session = session || null;
  state.token   = session ? session.access_token : null;
  await loadPublicUser();
  if (typeof renderHeader === 'function') try { renderHeader(); } catch(_){}
}

// Boot: read the existing session (if any) and install the listener.
async function initAuth() {
  const { data } = await sbClient.auth.getSession();
  await onAuthSession(data ? data.session : null);
  sbClient.auth.onAuthStateChange((_event, session) => { onAuthSession(session); });
}

async function logout() {
  try { await sbClient.auth.signOut(); } catch(_) {}
  state.user = null; state.token = null; state.session = null;
  navigate('homepage');
}

// ── Low-level Supabase REST helper ──
// When a user is signed in we forward their JWT as Authorization so that
// RLS policies and SECURITY DEFINER functions see the real auth.uid() /
// auth.jwt()->>'email' / email_verified claims. Otherwise we fall back to
// the anon/publishable key for read-only public data.
async function sb(path, opts = {}) {
  const userJwt = state.session && state.session.access_token;
  const res = await fetch(`${SB_URL}/${path}`, {
    method: opts.method || 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${userJwt || SB_KEY}`,
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) { const err = await res.text(); throw new Error(err || `Error ${res.status}`); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── RPC helper: call a Postgres function via PostgREST ──
async function rpc(fn, params = {}) {
  return sb(`rpc/${fn}`, { method: 'POST', body: params });
}

function isSwedish(slug) { return SWEDISH_PREFIXES.some(p => (slug||'').startsWith(p)); }
// esc() — HTML-escape for BOTH text content and attribute contexts.
// Escapes & < > " ' so it's safe inside <div>${esc(x)}</div> AND
// inside attribute="${esc(x)}". Do NOT use the old textContent trick:
// it leaves " and ' unescaped, which breaks attributes.
function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// js() — escape for a single-quoted JS string literal inside a
// double-quoted HTML attribute: onclick="doThing('${js(x)}')".
// Uses hex/unicode escapes for & " ' < > so the output contains NO
// raw & " ' characters that could break out of the HTML attribute or
// be decoded by the attribute parser (e.g. &quot;, &#39;). Must not be
// used for plain text or HTML content — use esc() for those.
function js(s) { return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/&/g,'\\x26').replace(/"/g,'\\x22').replace(/'/g,'\\x27').replace(/</g,'\\u003c').replace(/>/g,'\\u003e').replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/\u2028/g,'\\u2028').replace(/\u2029/g,'\\u2029'); }

// ── Enrich courses with ratings, enrollment counts, instructor name, country ──
async function enrichCourses(courses) {
  for (const c of (courses || [])) {
    const [reviews, enrollments] = await Promise.all([
      sb(`reviews?select=rating&course_id=eq.${c.id}`),
      sb(`enrollments?select=id&course_id=eq.${c.id}`)
    ]);
    const ratings = (reviews||[]).map(r => r.rating);
    c.avg_rating = ratings.length ? Math.round(ratings.reduce((s,r)=>s+r,0)/ratings.length*10)/10 : 0;
    c.review_count = ratings.length;
    c.enrollment_count = (enrollments||[]).length;
    if (c.categories) { c.category_name = c.categories.name; c.category_slug = c.categories.slug; }
    if (c.users) { c.instructor_name = `${c.users.first_name} ${c.users.last_name}`; c.instructor_user_id = c.users.id; }
    c.country = isSwedish(c.slug) ? 'sweden' : 'international';
  }
  return courses || [];
}

      const cs = await sb(`courses?select=id&instructor_id=eq.${u.id}&status=eq.published`);
      const cnt = (cs||[]).length;
      if (cnt > 0) result.push({ name: `${u.first_name} ${u.last_name}`, id: u.id, course_count: cnt });
    }
    result.sort((a,b) => b.course_count - a.course_count);
    return result;
  }

  // GET /courses?...
  if (path.startsWith('/courses') && !path.match(/\/\d+/) && method === 'GET') {
    const ps = new URLSearchParams(path.split('?')[1] || '');
    const page = parseInt(ps.get('page'))||1, per_page = parseInt(ps.get('per_page'))||12;
    const category = ps.get('category'), level = ps.get('level'), fmt = ps.get('format');
    const search = ps.get('search')||'', sort = ps.get('sort')||'popular';
    const featured = ps.get('featured'), country = ps.get('country')||'', price_range = ps.get('price_range')||'', instructor = ps.get('instructor')||'', start_date = ps.get('start_date')||'';
    let qs = 'select=*,categories(name,slug),users!courses_instructor_id_fkey(id,first_name,last_name)&status=eq.published';
    if (level) qs += `&level=eq.${level}`;
    if (fmt) qs += `&format=eq.${fmt}`;
    if (featured) qs += '&is_featured=eq.true';
    if (price_range) {
      if (price_range === '500+') qs += '&price=gte.500';
      else if (price_range.includes('-')) { const [lo,hi] = price_range.split('-'); qs += `&price=gte.${lo}&price=lte.${hi}`; }
    }
    if (category) {
      const catData = await sb(`categories?select=id&slug=eq.${category}`);
      if (catData && catData[0]) qs += `&category_id=eq.${catData[0].id}`;
    }
    if (search) qs += `&or=(title.ilike.%25${search}%25,description.ilike.%25${search}%25)`;
    if (start_date) {
      const now = new Date(); const y = now.getFullYear(), m = now.getMonth();
      if (start_date === 'upcoming') qs += `&start_date=gte.${now.toISOString().slice(0,10)}`;
      else if (start_date === 'this_month') { qs += `&start_date=gte.${new Date(y,m,1).toISOString().slice(0,10)}&start_date=lte.${new Date(y,m+1,0).toISOString().slice(0,10)}`; }
      else if (start_date === 'next_month') { qs += `&start_date=gte.${new Date(y,m+1,1).toISOString().slice(0,10)}&start_date=lte.${new Date(y,m+2,0).toISOString().slice(0,10)}`; }
      else if (start_date === 'next_3months') { qs += `&start_date=gte.${now.toISOString().slice(0,10)}&start_date=lte.${new Date(y,m+3,0).toISOString().slice(0,10)}`; }
    }
    const orderMap = { popular:'created_at.desc', price_asc:'price.asc', price_desc:'price.desc', newest:'created_at.desc', rating:'created_at.desc', date_asc:'start_date.asc.nullslast', date_desc:'start_date.desc.nullslast' };
    qs += `&order=${orderMap[sort]||'created_at.desc'}`;
    const usePostFilter = !!(country || instructor);
    if (usePostFilter) qs += '&limit=200&offset=0';
    else qs += `&limit=${per_page}&offset=${(page-1)*per_page}`;
    let courses = await sb(`courses?${qs}`);
    await enrichCourses(courses);
    if (country) courses = courses.filter(c => c.country === country);
    if (instructor) courses = courses.filter(c => c.instructor_name === instructor);
    // Featured courses always first, then sort within groups
    if (sort === 'popular') courses.sort((a,b) => (b.is_featured?1:0)-(a.is_featured?1:0) || (b.enrollment_count||0)-(a.enrollment_count||0));
    else if (sort === 'rating') courses.sort((a,b) => (b.is_featured?1:0)-(a.is_featured?1:0) || (b.avg_rating||0)-(a.avg_rating||0));
    else courses.sort((a,b) => (b.is_featured?1:0)-(a.is_featured?1:0));
    let total;
    if (usePostFilter) { total = courses.length; courses = courses.slice((page-1)*per_page, page*per_page); }
    else { const all = await sb('courses?select=id&status=eq.published'); total = (all||[]).length; }
    return { courses: courses||[], total, page, per_page, total_pages: Math.ceil(total/per_page) };
  }

  // GET /courses/:id/reviews
  if ((m = path.match(/\/courses\/(\d+)\/reviews/)) && method === 'GET') {
    const cid = m[1]; const ps = new URLSearchParams(path.split('?')[1]||'');
    const page = parseInt(ps.get('page'))||1, per_page = parseInt(ps.get('per_page'))||10;
    const reviews = await sb(`reviews?select=*,users!reviews_user_id_fkey(first_name,last_name,avatar_url)&course_id=eq.${cid}&order=created_at.desc&limit=${per_page}&offset=${(page-1)*per_page}`);
    for (const r of (reviews||[])) { if (r.users) { r.first_name=r.users.first_name; r.last_name=r.users.last_name; r.avatar_url=r.users.avatar_url; } }
    const all = await sb(`reviews?select=id&course_id=eq.${cid}`);
    return { reviews: reviews||[], total: (all||[]).length, page };
  }

  // POST /courses/:id/reviews
  if ((m = path.match(/\/courses\/(\d+)\/reviews/)) && method === 'POST') {
    if (!state.user) throw new Error('Authentication required');
    const cid = m[1];
    const review = await sb('reviews', { method: 'POST', body: { user_id: state.user.id, course_id: parseInt(cid), rating: body.rating, comment: body.comment }, headers: { 'Prefer': 'return=representation' } });
    return { id: review[0].id, message: 'Review created' };
  }

  // GET /courses/:id
  if ((m = path.match(/\/courses\/(\d+)$/)) && method === 'GET') {
    const cid = m[1];
    const courses = await sb(`courses?select=*,categories(name,slug),users!courses_instructor_id_fkey(id,first_name,last_name,bio,title)&id=eq.${cid}`);
    if (!courses || !courses[0]) throw new Error('Course not found');
    const c = courses[0];
    if (c.categories) { c.category_name=c.categories.name; c.category_slug=c.categories.slug; }
    if (c.users) { c.instructor_name=`${c.users.first_name} ${c.users.last_name}`; c.instructor_user_id=c.users.id; c.instructor_bio=c.users.bio; c.instructor_title=c.users.title; }
    const [reviews, enrollments, modules] = await Promise.all([
      sb(`reviews?select=rating&course_id=eq.${cid}`),
      sb(`enrollments?select=id&course_id=eq.${cid}`),
      sb(`modules?select=*&course_id=eq.${cid}&order=sort_order.asc`)
    ]);
    const ratings = (reviews||[]).map(r=>r.rating);
    c.avg_rating = ratings.length ? Math.round(ratings.reduce((s,r)=>s+r,0)/ratings.length*10)/10 : 0;
    c.review_count = ratings.length;
    c.enrollment_count = (enrollments||[]).length;
    for (const mod of (modules||[])) { mod.lessons = await sb(`lessons?select=*&module_id=eq.${mod.id}&order=sort_order.asc`) || []; }
    c.modules = modules || [];
    const rb = {}; for (let i=1;i<=5;i++) rb[String(i)] = ratings.filter(r=>r===i).length;
    c.rating_breakdown = rb;
    return c;
  }

  // GET /instructors/:id
  if ((m = path.match(/\/instructors\/(\d+)/)) && method === 'GET') {
    const iid = m[1];
    // created_at removed from the projection after Phase 4d (column grant
    // narrowed; renderInstructor at line ~1986 does not display it anyway).
    const users = await sb(`users?select=id,first_name,last_name,bio,title,avatar_url&id=eq.${iid}&role=eq.instructor`);
    if (!users||!users[0]) throw new Error('Instructor not found');
    const inst = users[0];
    const courses = await sb(`courses?select=*,categories(name)&instructor_id=eq.${iid}&status=eq.published`);
    inst.course_count = (courses||[]).length;
    let totalStudents=0, totalReviews=0, allRatings=[];
    for (const c of (courses||[])) {
      const [en, rv] = await Promise.all([sb(`enrollments?select=id&course_id=eq.${c.id}`), sb(`reviews?select=rating&course_id=eq.${c.id}`)]);
      const r = (rv||[]).map(x=>x.rating);
      c.enrollment_count = (en||[]).length; c.review_count = r.length;
      c.avg_rating = r.length ? Math.round(r.reduce((s,x)=>s+x,0)/r.length*10)/10 : 0;
      if (c.categories) c.category_name = c.categories.name;
      totalStudents += c.enrollment_count; totalReviews += r.length; allRatings.push(...r);
    }
    inst.total_students = totalStudents; inst.total_reviews = totalReviews;
    inst.avg_rating = allRatings.length ? Math.round(allRatings.reduce((s,r)=>s+r,0)/allRatings.length*10)/10 : 0;
    inst.expertise = await sb(`instructor_expertise?select=expertise&user_id=eq.${iid}`) || [];
    inst.credentials = await sb(`instructor_credentials?select=credential&user_id=eq.${iid}&order=sort_order.asc`) || [];
    inst.courses = courses || [];
    return inst;
  }

  // POST /auth/signin — Supabase Auth (email/password)
  if (path === '/auth/signin' && method === 'POST') {
    const { data, error } = await sbClient.auth.signInWithPassword({ email: body.email, password: body.password });
    if (error) throw new Error(error.message || 'Invalid email or password');
    // onAuthStateChange will fire and populate state.session / state.user
    // but we await it explicitly here so the caller can navigate right after.
    await onAuthSession(data.session);
    if (!state.session || !state.session.user.email_confirmed_at) {
      // Rare: user signed in but never confirmed. Treat as pending.
      return { pending_confirmation: true, email: body.email };
    }
    return { user: state.user || { email: body.email } };
  }

  // POST /auth/signup — Supabase Auth, sends confirmation email
  if (path === '/auth/signup' && method === 'POST') {
    const { data, error } = await sbClient.auth.signUp({
      email: body.email,
      password: body.password,
      options: {
        // Users come back to the site after clicking the confirmation link.
        emailRedirectTo: window.location.origin + '/?confirmed=1',
        data: {
          first_name: body.first_name || '',
          last_name:  body.last_name  || '',
          role:       'instructor',
          company:    body.company  || ''
        }
      }
    });
    if (error) throw new Error(error.message || 'Sign-up failed');
    // If Supabase is configured to require email confirmation, data.session is null.
    if (!data.session) {
      return { pending_confirmation: true, email: body.email };
    }
    // Otherwise (confirmation disabled) we have an immediate session.
    await onAuthSession(data.session);
    return { user: state.user || { email: body.email } };
  }

  // GET /auth/me
  if (path === '/auth/me') {
    // state.user is kept fresh by loadPublicUser() → get_my_profile RPC
    // on every auth state change, so we just return it directly instead
    // of re-fetching. (Also: after Phase 4d, email is no longer in the
    // public.users column grant, so the old direct SELECT would 403.)
    if (!state.user) throw new Error('Authentication required');
    return state.user;
  }

  // POST /enrollments
  if (path === '/enrollments' && method === 'POST') {
    if (!state.user) throw new Error('Authentication required');
    const existing = await sb(`enrollments?select=id&user_id=eq.${state.user.id}&course_id=eq.${body.course_id}`);
    if (existing && existing.length) throw new Error('Already enrolled');
    const en = await sb('enrollments', { method:'POST', body:{ user_id:state.user.id, course_id:body.course_id }, headers:{'Prefer':'return=representation'} });
    return { id:(en[0]||en).id, message:'Enrolled successfully' };
  }

  // GET /enrollments
  if (path === '/enrollments' && method === 'GET') {
    if (!state.user) throw new Error('Authentication required');
    return await sb(`enrollments?select=*,courses(title,slug,image_url,categories(name),users!courses_instructor_id_fkey(first_name,last_name))&user_id=eq.${state.user.id}&order=enrolled_at.desc`) || [];
  }

  // POST /wishlist
  if (path === '/wishlist' && method === 'POST') {
    if (!state.user) throw new Error('Authentication required');
    const existing = await sb(`wishlist?select=id&user_id=eq.${state.user.id}&course_id=eq.${body.course_id}`);
    if (existing && existing.length) {
      await sb(`wishlist?id=eq.${existing[0].id}`, { method:'DELETE' });
      return { message:'Removed from wishlist', wishlisted:false };
    }
    await sb('wishlist', { method:'POST', body:{ user_id:state.user.id, course_id:body.course_id }, headers:{'Prefer':'return=minimal'} });
    return { message:'Added to wishlist', wishlisted:true };
  }

  // GET /wishlist
  if (path === '/wishlist' && method === 'GET') {
    if (!state.user) throw new Error('Authentication required');
    return await sb(`wishlist?select=*,courses(id,title,slug,price,original_price,image_url,users!courses_instructor_id_fkey(first_name,last_name))&user_id=eq.${state.user.id}&order=created_at.desc`) || [];
  }

  // POST /orders
  if (path === '/orders' && method === 'POST') {
    if (!state.user) throw new Error('Authentication required');
    const courses = await sb(`courses?select=*&id=eq.${body.course_id}&status=eq.published`);
    if (!courses||!courses[0]) throw new Error('Course not found');
    let amount = parseFloat(courses[0].price), discount = 0;
    if (body.coupon_code) {
      const coupons = await sb(`coupons?select=*&code=eq.${encodeURIComponent(body.coupon_code)}&is_active=eq.true`);
      if (coupons && coupons[0]) {
        const cp = coupons[0];
        if (cp.discount_type === 'fixed') discount = parseFloat(cp.discount_value);
        else discount = amount * (parseFloat(cp.discount_value)/100);
        await sb(`coupons?id=eq.${cp.id}`, { method:'PATCH', body:{ uses: cp.uses+1 }, headers:{'Prefer':'return=minimal'} });
      }
    }
    const finalAmount = Math.max(0, amount - discount);
    const order = await sb('orders', { method:'POST', body:{ user_id:state.user.id, course_id:body.course_id, amount:finalAmount, discount, coupon_code:body.coupon_code||null, payment_method:body.payment_method||'credit_card', payment_status:'completed', billing_name:body.billing_name, billing_email:body.billing_email, billing_address:body.billing_address, billing_city:body.billing_city, billing_state:body.billing_state, billing_zip:body.billing_zip, billing_country:body.billing_country||'US' }, headers:{'Prefer':'return=representation'} });
    const existing = await sb(`enrollments?select=id&user_id=eq.${state.user.id}&course_id=eq.${body.course_id}`);
    if (!existing||!existing.length) await sb('enrollments', { method:'POST', body:{ user_id:state.user.id, course_id:body.course_id }, headers:{'Prefer':'return=minimal'} });
    return { id:(order[0]||order).id, amount:finalAmount, message:'Order completed' };
  }

  // POST /coupons/validate
  if (path === '/coupons/validate' && method === 'POST') {
    const coupons = await sb(`coupons?select=*&code=eq.${encodeURIComponent(body.code)}&is_active=eq.true`);
    if (!coupons||!coupons[0]) throw new Error('Invalid coupon');
    return { valid:true, discount_type:coupons[0].discount_type, discount_value:parseFloat(coupons[0].discount_value) };
  }

  // GET /search
  if (path.startsWith('/search')) {
    const ps = new URLSearchParams(path.split('?')[1]||'');
    const q = ps.get('q')||'';
    if (q.length < 2) return { courses:[], instructors:[] };
    const [courses, instructors] = await Promise.all([
      sb(`courses?select=id,title,slug,price,currency,image_url,categories(name),users!courses_instructor_id_fkey(first_name,last_name)&status=eq.published&or=(title.ilike.%25${q}%25,description.ilike.%25${q}%25)&limit=10`),
      sb(`users?select=id,first_name,last_name,title&role=eq.instructor&or=(first_name.ilike.%25${q}%25,last_name.ilike.%25${q}%25)&limit=5`)
    ]);
    for (const c of (courses||[])) { if(c.categories) c.category_name=c.categories.name; if(c.users) c.instructor_name=`${c.users.first_name} ${c.users.last_name}`; }
    return { courses:courses||[], instructors:instructors||[] };
  }

  // GET /instructor/dashboard
  if (path === '/instructor/dashboard') {
    if (!state.user) throw new Error('Authentication required');
    const courses = await sb(`courses?select=*&instructor_id=eq.${state.user.id}`);
    let totalRevenue=0, totalStudents=0, allRatings=[], topCourses=[];
    for (const c of (courses||[])) {
      const [orders, enrollments, reviews] = await Promise.all([
        sb(`orders?select=amount&course_id=eq.${c.id}&payment_status=eq.completed`),
        sb(`enrollments?select=id&course_id=eq.${c.id}`),
        sb(`reviews?select=rating&course_id=eq.${c.id}`)
      ]);
      const revenue = (orders||[]).reduce((s,o)=>s+parseFloat(o.amount),0);
      const students = (enrollments||[]).length;
      const ratings = (reviews||[]).map(r=>r.rating);
      const avgR = ratings.length ? Math.round(ratings.reduce((s,r)=>s+r,0)/ratings.length*10)/10 : 0;
      totalRevenue+=revenue; totalStudents+=students; allRatings.push(...ratings);
      topCourses.push({ id:c.id, title:c.title, status:c.status, students, avg_rating:avgR, revenue });
    }
    topCourses.sort((a,b)=>b.revenue-a.revenue);
    return { stats:{ total_revenue:totalRevenue, total_students:totalStudents, total_courses:(courses||[]).length, avg_rating:allRatings.length?Math.round(allRatings.reduce((s,r)=>s+r,0)/allRatings.length*10)/10:0 }, recent_activity:[], top_courses:topCourses };
  }

  // POST /instructor/courses — create a new course via SECURITY DEFINER RPC
  // Ownership, 5-course free-tier limit, slug uniqueness, and role promotion
  // are all enforced inside create_course(). The courses table has no direct
  // INSERT grant for authenticated clients after Phase 3.
  if (path === '/instructor/courses' && method === 'POST') {
    if (!state.session) throw new Error('Authentication required');
    const res = await rpc('create_course', { p_payload: body });
    if (res && res.course_id) {
      const rows = await sb(`courses?id=eq.${res.course_id}&select=*`);
      return (rows && rows[0]) || res;
    }
    return res;
  }

  // PATCH /instructor/courses/:id — update own course via SECURITY DEFINER RPC
  if ((m = path.match(/\/instructor\/courses\/(\d+)$/)) && method === 'PATCH') {
    if (!state.session) throw new Error('Authentication required');
    const cid = parseInt(m[1], 10);
    await rpc('update_claimed_course', { p_course_id: cid, p_patch: body });
    return { message: 'Course updated' };
  }

  // DELETE /instructor/courses/:id — delete own course via SECURITY DEFINER RPC
  if ((m = path.match(/\/instructor\/courses\/(\d+)$/)) && method === 'DELETE') {
    if (!state.session) throw new Error('Authentication required');
    const cid = parseInt(m[1], 10);
    await rpc('delete_claimed_course', { p_course_id: cid });
    return { message: 'Course deleted' };
  }

  // POST /membership/subscribe — single SECURITY DEFINER RPC replaces the
  // old memberships INSERT + users PATCH + courses PATCH trio. The
  // activate_membership RPC (Phase 4a) enforces server-side tier→amount
  // mapping + expiry, and writes memberships + users premium flags +
  // courses.is_featured atomically. Direct writes on all three tables
  // are REVOKE'd, so this is now the ONLY client-reachable code path.
  if (path === '/membership/subscribe' && method === 'POST') {
    if (!state.user) throw new Error('Authentication required');
    const tier = body.tier || 'premium'; // 'premium', 'premium_plus', or 'premium_pro'
    const res  = await rpc('activate_membership', { p_tier: tier });
    if (res && res.tier) {
      state.user.is_premium         = true;
      state.user.premium_tier       = res.tier;
      state.user.premium_expires_at = res.expires_at;
      localStorage.setItem('lp_user', JSON.stringify(state.user));
    }
    const tierLabels = { premium_pro:'Premium Pro', premium_plus:'Premium Plus', premium:'Premium' };
    return {
      message: (tierLabels[(res && res.tier) || tier] || 'Premium') + ' activated!',
      expires_at: res && res.expires_at
    };
  }

  // GET /membership/status
  if (path === '/membership/status' && method === 'GET') {
    if (!state.user) throw new Error('Authentication required');
    const memberships = await sb(`memberships?select=*&user_id=eq.${state.user.id}&order=created_at.desc&limit=1`);
    // is_premium / premium_tier / premium_expires_at are no longer readable
    // via direct SELECT on public.users after Phase 4d. Pull them via the
    // get_my_profile RPC (SECURITY DEFINER, auth.uid() check server-side).
    const u = await rpc('get_my_profile');
    return { membership: (memberships && memberships[0]) || null, is_premium: !!(u && u.is_premium), premium_tier: (u && u.premium_tier) || null, premium_expires_at: (u && u.premium_expires_at) || null };
  }

  // PUT /users/profile
  if (path === '/users/profile' && method === 'PUT') {
    if (!state.user) throw new Error('Authentication required');
    const allowed = ['first_name','last_name','company','bio','title'];
    const updates = {}; for (const k of allowed) if (body[k] !== undefined) updates[k] = body[k];
    updates.updated_at = new Date().toISOString();
    await sb(`users?id=eq.${state.user.id}`, { method:'PATCH', body:updates, headers:{'Prefer':'return=minimal'} });
    return { message:'Profile updated' };
  }

  throw new Error(`Unknown route: ${path}`);
}

function toast(msg, type = '') { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast show' + (type ? ' toast-' + type : ''); setTimeout(() => el.className = 'toast', 3000); }
function starsHtml(r) { const f = Math.floor(r); return '<span class="stars">' + '\u2605'.repeat(f) + '\u2606'.repeat(5 - f) + '</span>'; }
function initials(a, b) { return esc(((a||'')[0]||'') + ((b||'')[0]||'')); }
function grad(id) { const g=[['#1a365d','#2d5a8e'],['#1e4d3d','#2a7a62'],['#4a2545','#7a3b6e'],['#5a3e1a','#8a6830'],['#2d4a6e','#4a7aae'],['#2a4a3a','#3d6e55'],['#3d2a5a','#5a3d8a'],['#5a2a2a','#8a4040'],['#1a3d5a','#2d6a8e'],['#3a4a2a','#5a7a3a']][((id||0)%10)]; return `linear-gradient(135deg,${g[0]},${g[1]})`; }
function fmtPrice(p, currency) {
  const n = Number(p);
  if (!n) return '';
  if (currency === 'SEK') return n.toLocaleString('sv-SE') + ' kr';
  return '$' + n.toLocaleString('en-US');
}

const SITE_URL      = 'https://upskillcompass.com';
const DEFAULT_TITLE = "UpskillCompass — World's largest leadership training database";
const DEFAULT_DESC  = "Discover and compare 100+ leadership and certification training programs from top providers — CCL, IMD, INSEAD, Wharton, Harvard PON, Scrum Alliance, AWS, ISC2, PMI and more. Filter by format, level, language, country and price.";

// Update <title>, meta description, og:* and twitter:* tags + canonical link.
function setPageMeta(opts) {
  opts = opts || {};
  const title = opts.title || DEFAULT_TITLE;
  const desc  = opts.description || DEFAULT_DESC;
  document.title = title;
  const setM = (sel, attr, val) => {
    let el = document.head.querySelector(sel);
    if (!el) {
      el = document.createElement('meta');
      const m = sel.match(/meta\[(name|property)="([^"]+)"\]/);
      if (m) el.setAttribute(m[1], m[2]);
      document.head.appendChild(el);
    }
    el.setAttribute('content', val);
  };
  setM('meta[name="description"]', 'name', desc);
  setM('meta[property="og:title"]', 'property', title);
  setM('meta[property="og:description"]', 'property', desc);
  setM('meta[property="og:url"]', 'property', window.location.origin + window.location.pathname);
  setM('meta[property="og:type"]', 'property', opts.ogType || 'website');
  setM('meta[name="twitter:title"]', 'name', title);
  setM('meta[name="twitter:description"]', 'name', desc);
  let canon = document.head.querySelector('link[rel="canonical"]');
  if (!canon) { canon = document.createElement('link'); canon.setAttribute('rel','canonical'); document.head.appendChild(canon); }
  canon.setAttribute('href', window.location.origin + window.location.pathname);

  // hreflang alternates: every page exists in en (default, no prefix), sv,
  // de, fr — plus an x-default pointing at the en version.
  document.head.querySelectorAll('link[rel="alternate"][hreflang]').forEach(l => l.remove());
  const [, basePath] = stripLangPrefix(window.location.pathname);
  const search = window.location.search;
  for (const code of LANG_CODES) {
    const link = document.createElement('link');
    link.setAttribute('rel', 'alternate');
    link.setAttribute('hreflang', code);
    link.setAttribute('href', langUrl(code, basePath, search));
    document.head.appendChild(link);
  }
  const xd = document.createElement('link');
  xd.setAttribute('rel', 'alternate');
  xd.setAttribute('hreflang', 'x-default');
  xd.setAttribute('href', langUrl('en', basePath, search));
  document.head.appendChild(xd);

  // Update og:locale with the active language so social previews are right.
  const ogLocaleMap = { en: 'en_US', sv: 'sv_SE', de: 'de_DE', fr: 'fr_FR' };
  setM('meta[property="og:locale"]', 'property', ogLocaleMap[currentLang] || 'en_US');
  // Keep <html lang> in sync — assistive tech and search engines key off it.
  document.documentElement.lang = currentLang;
}

// Inject (or remove) a JSON-LD <script> for the current page.
function setJsonLd(obj) {
  let el = document.getElementById('seo-page-jsonld');
  if (!obj) { if (el) el.remove(); return; }
  if (!el) {
    el = document.createElement('script');
    el.type = 'application/ld+json';
    el.id = 'seo-page-jsonld';
    document.head.appendChild(el);
  }
  el.textContent = JSON.stringify(obj);
}

// hreflang language-prefix scheme: en is the default and sits at /,
// other langs live at /<code>/... (sv/de/fr). Keep LANG_CODES in sync
// with the i18n table T at the top of the script.
const LANG_CODES = ['en', 'sv', 'de', 'fr'];

function langPrefix(code) {
  return (code && code !== 'en' && LANG_CODES.includes(code)) ? '/' + code : '';
}

// `/sv/courses/x` -> ['sv', '/courses/x']; `/courses/x` -> ['en', '/courses/x'].
function stripLangPrefix(pathname) {
  const m = (pathname || '/').match(/^\/([a-z]{2})(?:\/(.*))?$/);
  if (m && LANG_CODES.includes(m[1]) && m[1] !== 'en') {
    return [m[1], '/' + (m[2] || '')];
  }
  return ['en', pathname || '/'];
}

// Compose a fully-qualified URL for (langCode, basePath, search). basePath
// here is the stripped path (no lang prefix). The "homepage" case keeps
// /sv (no trailing slash) consistent with routeToUrl.
function langUrl(code, basePath, search) {
  const prefix = langPrefix(code);
  if (basePath === '/' || basePath === '') {
    return SITE_URL + (prefix || '/') + (search || '');
  }
  return SITE_URL + prefix + basePath + (search || '');
}

// (page, data) -> URL path. Keep in sync with urlToRoute below.
function routeToUrl(page, data) {
  let basePath;
  switch (page) {
    case 'homepage': basePath = '/'; break;
    case 'catalog': {
      if (!data || typeof data !== 'object') { basePath = '/courses'; break; }
      const p = new URLSearchParams();
      ['country','category','level','format','instructor','search','sort'].forEach(k => { if (data[k]) p.set(k, data[k]); });
      if (data.startdate) p.set('start_date', data.startdate);
      if (data.price)     p.set('price', data.price);
      const qs = p.toString();
      basePath = '/courses' + (qs ? '?' + qs : '');
      break;
    }
    case 'detail':         basePath = '/courses/' + (data == null ? '' : data); break;
    case 'instructor':     basePath = '/instructors/' + (data == null ? '' : data); break;
    case 'auth':           basePath = data === 'signup' ? '/sign-up' : '/sign-in'; break;
    case 'dashboard':      basePath = '/dashboard'; break;
    case 'admin':          basePath = '/admin'; break;
    case 'my-courses':     basePath = '/my-courses'; break;
    case 'manage-courses': basePath = '/manage'; break;
    case 'course-form':    basePath = '/manage/new'; break;
    case 'premium':        basePath = '/premium'; break;
    case 'for-instructors': basePath = '/for-instructors'; break;
    case 'checkout':       basePath = '/checkout'; break;
    default: basePath = '/';
  }
  const prefix = langPrefix(currentLang);
  if (basePath === '/') return prefix || '/';
  return prefix + basePath;
}

// URL -> [page, data]. Also syncs currentLang + <html lang> from URL.
function urlToRoute() {
  const fullPath = window.location.pathname || '/';
  const [lang, path] = stripLangPrefix(fullPath);
  if (currentLang !== lang) {
    currentLang = lang;
    try { localStorage.setItem('lp_lang', lang); } catch(_) {}
    _featuredCache = null; // i18n strings on cards change with lang
  }
  document.documentElement.lang = lang;

  const sp = new URLSearchParams(window.location.search);
  if (path === '/' || path === '') return ['homepage', null];
  if (path === '/courses') {
    const data = {};
    ['country','category','level','format','instructor','search','sort'].forEach(k => {
      const v = sp.get(k); if (v) data[k] = v;
    });
    if (sp.get('start_date')) data.startdate = sp.get('start_date');
    if (sp.get('price'))      data.price     = sp.get('price');
    return ['catalog', Object.keys(data).length ? data : null];
  }
  let m;
  if ((m = path.match(/^\/courses\/(.+)$/)))     return ['detail', decodeURIComponent(m[1])];
  if ((m = path.match(/^\/instructors\/(.+)$/))) {
    const v = decodeURIComponent(m[1]);
    return ['instructor', /^\d+$/.test(v) ? parseInt(v) : v];
  }
  if (path === '/sign-in')        return ['auth', 'signin'];
  if (path === '/sign-up')        return ['auth', 'signup'];
  if (path === '/dashboard')      return ['dashboard', null];
  if (path === '/admin')          return ['admin', null];
  if (path === '/my-courses')     return ['my-courses', null];
  if (path === '/manage')         return ['manage-courses', null];
  if (path === '/manage/new')     return ['course-form', null];
  if (path === '/premium')        return ['premium', null];
  if (path === '/for-instructors') return ['for-instructors', null];
  if (path === '/checkout')       return ['checkout', null];
  return ['homepage', null];
}

function navigate(page, data, options) {
  options = options || {};
  window.__currentPage = page;
  window.__pageData = data;
  // Sync URL into history. skipHistory=true is used by the popstate handler
  // (URL is already correct when the browser fires popstate).
  if (!options.skipHistory) {
    try {
      const url = routeToUrl(page, data);
      const cur = window.location.pathname + window.location.search;
      if (cur !== url) {
        if (options.replace) history.replaceState({ page }, '', url);
        else                 history.pushState({ page },  '', url);
      }
    } catch (_) {}
  }
  // Reset SEO state. renderDetail / renderInstructor / renderCatalog override
  // these in their bodies; everything else inherits the homepage defaults.
  setPageMeta({});
  setJsonLd(null);
  window.scrollTo(0, 0);
  renderHeader();
  const app = document.getElementById('app');
  const fc = document.getElementById('footer-container');
  const noFooter = ['dashboard', 'admin', 'auth', 'manage-courses', 'course-form', 'premium'];
  fc.innerHTML = noFooter.includes(page) ? '' : renderFooter();
  renderFeaturedSidebar();
  switch (page) {
    case 'homepage': renderHomepage(app); break;
    case 'catalog': renderCatalog(app, data); break;
    case 'detail': renderDetail(app, data); break;
    case 'instructor': renderInstructor(app, data); break;
    case 'checkout': renderCheckout(app, data); break;
    case 'dashboard': renderDashboard(app); break;
    case 'admin': renderAdmin(app); break;
    case 'auth': renderAuth(app, data); break;
    case 'my-courses': renderMyCourses(app); break;
    case 'manage-courses': renderManageCourses(app); break;
    case 'course-form': renderCourseForm(app, data); break;
    case 'premium': renderPremium(app); break;
    case 'for-instructors': renderForInstructors(app); break;
    default: renderHomepage(app);
  }
}

window.addEventListener('popstate', () => {
  const [p, d] = urlToRoute();
  navigate(p, d, { skipHistory: true });
});

// ============================================================
let _featuredCache = null;
async function renderFeaturedSidebar() {
  const sb_el = document.getElementById('featured-sidebar');
  if (!sb_el) return;
  // Show loading on first render
  if (!_featuredCache) {
    sb_el.innerHTML = `<h4>\u2B50 ${t('featured')}</h4><div style="text-align:center;padding:20px 0;"><div class="loading-spinner" style="width:20px;height:20px;"></div></div>`;
  }
  try {
    if (!_featuredCache) {
      let courses;
      try { courses = await sb('courses?select=id,title,price,currency,is_featured,categories(name),users!courses_instructor_id_fkey(first_name,last_name,premium_tier)&is_featured=eq.true&status=eq.published&order=created_at.desc&limit=20'); }
      catch(_) { courses = await sb('courses?select=id,title,price,currency,is_featured,categories(name),users!courses_instructor_id_fkey(first_name,last_name)&is_featured=eq.true&status=eq.published&order=created_at.desc&limit=20'); }
      // Premium Plus instructors get 5x visibility — duplicate their courses in the list
      let expanded = [];
      for (const c of (courses || [])) {
        const tier = c.users && c.users.premium_tier;
        const repeats = tier === 'premium_pro' ? 10 : tier === 'premium_plus' ? 5 : 1;
        for (let i = 0; i < repeats; i++) expanded.push(c);
      }
      // Shuffle so Premium Plus entries are spread out, not clumped
      for (let i = expanded.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [expanded[i], expanded[j]] = [expanded[j], expanded[i]]; }
      _featuredCache = expanded;
    }
    if (!_featuredCache.length) {
      sb_el.innerHTML = `<h4>\u2B50 ${t('featured')}</h4><p style="color:var(--slate-400);font-size:12px;">No featured courses yet.</p>`;
      return;
    }
    sb_el.innerHTML = `<h4>\u2B50 ${t('featured')}</h4>` + _featuredCache.map(c => {
      const instr = c.users ? `${c.users.first_name} ${c.users.last_name}` : '';
      const cat = c.categories ? c.categories.name : '';
      return `<div class="fs-card" onclick="navigate('detail','${js(c.slug || String(c.id))}')">
        <div class="fs-card-title">${esc(c.title)}</div>
        <div class="fs-card-instructor">${esc(instr)}</div>
        <div class="fs-card-meta">
          <span class="fs-card-badge">${esc(cat)}</span>
          <span class="fs-card-price">${fmtPrice(c.price, c.currency)}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    sb_el.innerHTML = `<h4>\u2B50 ${t('featured')}</h4><p style="color:var(--slate-400);font-size:12px;">${esc(e.message)}</p>`;
  }
}

    const stat = (n,l)=>`<div><strong style="font-size:28px;color:var(--navy-800);font-family:'Playfair Display',serif;">${n}</strong><br><span style="font-size:13px;color:var(--slate-500);">${l}</span></div>`;
    document.getElementById('home-stats').innerHTML = stat(tc+'+', t('courses_label')) + stat(cats.length, t('categories_label')) + stat((insts||[]).length, t('instructors_label'));
  } catch(e){ console.error(e); }
}

        <option value="">${t('all_countries')}</option>

        <option value="international" ${fd.country==='international'?'selected':''}>\u{1F30D} ${t('international')}</option>
      </select>

      <span class="filter-label">${t('category')}</span>
      <select class="filter-select" id="f-category">
        <option value="">${t('all_categories')}</option>
        ${cats.map(c=>`<option value="${esc(c.slug)}" ${fd.category===c.slug?'selected':''}>${esc(c.name)} (${c.course_count})</option>`).join('')}
      </select>
    </div>
    <div class="filter-item">
      <span class="filter-label">${t('level')}</span>
      <select class="filter-select" id="f-level">
        <option value="">${t('all_levels')}</option>
        ${['beginner','intermediate','advanced','executive'].map(l=>`<option value="${l}">${t(l)}</option>`).join('')}
      </select>

    <div class="filter-item">
      <span class="filter-label">${t('format')}</span>
      <select class="filter-select" id="f-format">
        <option value="">${t('all_formats')}</option>
        <option value="self-paced">${t('self_paced')}</option>
        <option value="live">${t('live')}</option>
        <option value="hybrid">${t('hybrid')}</option>
      </select>
    </div>
    <div class="filter-item">
      <span class="filter-label">${t('price_range')}</span>
      <select class="filter-select" id="f-price">

        <option value="0-200">${t('price_under_200')}</option>
        <option value="200-300">${t('price_200_300')}</option>
        <option value="300-500">${t('price_300_500')}</option>

      <span class="filter-label">${t('instructor_filter')}</span>
      <select class="filter-select" id="f-instructor">
        <option value="">${t('all_instructors')}</option>
        ${instructors.map(i=>`<option value="${esc(i.name)}">${esc(i.name)} (${i.course_count})</option>`).join('')}
      </select>
    </div>
    <button class="filter-clear" id="f-clear" title="${t('clear_filters')}">\u2715 ${t('clear_filters')}</button>`;

  let cp=1;
  function getFilters(){
    return {
      country: document.getElementById('f-country').value,
      cat: document.getElementById('f-category').value,
      lvl: document.getElementById('f-level').value,
      fmt: document.getElementById('f-format').value,
      price: document.getElementById('f-price').value,
      startdate: document.getElementById('f-startdate').value,
      inst: document.getElementById('f-instructor').value,
      s: document.getElementById('catalog-search').value,
      sort: document.getElementById('catalog-sort').value
    };
  }
  function updateActiveTags(f){
    const tags=[];
    const labelMap={country:t('country'),cat:t('category'),lvl:t('level'),fmt:t('format'),price:t('price_range'),startdate:t('start_date'),inst:t('instructor_filter'),s:t('search')};
    const valMap={
      country:{sweden:t('sweden'),international:t('international')},
      lvl:{beginner:t('beginner'),intermediate:t('intermediate'),advanced:t('advanced'),executive:t('executive')},
      fmt:{'self-paced':t('self_paced'),live:t('live'),hybrid:t('hybrid')},
      startdate:{upcoming:t('date_upcoming'),this_month:t('date_this_month'),next_month:t('date_next_month'),next_3months:t('date_next_3months')}
    };
    for(const[k,v] of Object.entries(f)){
      if(!v||k==='sort')continue;
      let display=v;
      if(valMap[k]&&valMap[k][v])display=valMap[k][v];
      if(k==='cat'){const c=cats.find(c=>c.slug===v);if(c)display=c.name;}
      if(k==='price'){const pm={'0-200':t('price_under_200'),'200-300':t('price_200_300'),'300-500':t('price_300_500'),'500+':t('price_over_500')};display=pm[v]||v;}
      tags.push(`<span class="active-filter-tag">${labelMap[k]||k}: ${esc(display)} <span class="remove" data-clear="${k}">\u2715</span></span>`);
    }
    const row=document.getElementById('active-filters-row');
    row.innerHTML=tags.length?`<div class="active-filters">${tags.join('')}</div>`:'';
    row.querySelectorAll('.remove').forEach(el=>el.addEventListener('click',e=>{
      const key=e.target.dataset.clear;
      const idMap={country:'f-country',cat:'f-category',lvl:'f-level',fmt:'f-format',price:'f-price',startdate:'f-startdate',inst:'f-instructor',s:'catalog-search'};
      const el2=document.getElementById(idMap[key]);
      if(el2){el2.value='';} load(1);
    }));
  }
  async function load(p){
    cp=p||1;
    const f=getFilters();
    updateActiveTags(f);
    let qs=`?page=${cp}&per_page=12&sort=${f.sort}`;
    if(f.cat)qs+=`&category=${f.cat}`;
    if(f.lvl)qs+=`&level=${f.lvl}`;
    if(f.fmt)qs+=`&format=${f.fmt}`;
    if(f.country)qs+=`&country=${f.country}`;
    if(f.price)qs+=`&price_range=${f.price}`;
    if(f.startdate)qs+=`&start_date=${f.startdate}`;
    if(f.inst)qs+=`&instructor=${encodeURIComponent(f.inst)}`;
    if(f.s)qs+=`&search=${encodeURIComponent(f.s)}`;
    try{
      const d=await api('/courses'+qs);const cs=d.courses||[];
      document.getElementById('catalog-count').textContent=`${t('showing')} ${d.total||cs.length} ${t('results')}`;
      document.getElementById('catalog-grid').innerHTML=cs.length?cs.map(c=>courseCard(c)).join(''):`<p style="grid-column:1/-1;text-align:center;color:var(--slate-500);padding:40px;">${t('no_courses')}</p>`;
      const perPage=12;const pages=Math.ceil((d.total||cs.length)/perPage)||1;let ph='';
      if(pages>1){
        if(cp>1)ph+=`<button onclick="window.__loadCat(${cp-1})">&lsaquo;</button>`;
        let start=Math.max(1,cp-2),end=Math.min(pages,start+4);start=Math.max(1,end-4);
        for(let i=start;i<=end;i++)ph+=`<button class="${i===cp?'active':''}" onclick="window.__loadCat(${i})">${i}</button>`;
        if(cp<pages)ph+=`<button onclick="window.__loadCat(${cp+1})">&rsaquo;</button>`;
      }
      document.getElementById('catalog-pagination').innerHTML=ph;
    }catch(e){document.getElementById('catalog-grid').innerHTML=`<p style="color:var(--red-600);">${esc(e.message)}</p>`;}
  }
  window.__loadCat=load;
  document.getElementById('filter-bar').addEventListener('change',()=>load(1));
  document.getElementById('catalog-search').addEventListener('keyup',e=>{if(e.key==='Enter')load(1);});
  document.getElementById('catalog-sort').addEventListener('change',()=>load(1));
  document.getElementById('f-clear').addEventListener('click',()=>{
    ['f-country','f-category','f-level','f-format','f-price','f-startdate','f-instructor'].forEach(id=>{document.getElementById(id).value='';});
    document.getElementById('catalog-search').value='';
    load(1);
  });
  load(1);
}

async function renderDetail(app, cidOrSlug) {
  app.innerHTML='<div class="page-loader"><div class="loading-spinner"></div></div>';
  try {
    // Accept either an integer course id or a string slug. If it's a slug,
    // resolve it to an id first so the existing /courses/:id endpoint works.
    let cid = cidOrSlug;
    if (typeof cidOrSlug === 'string' && !/^\d+$/.test(cidOrSlug)) {
      const lookup = await sb(`courses?select=id&slug=eq.${encodeURIComponent(cidOrSlug)}&limit=1`);
      if (!lookup || !lookup[0]) {
        app.innerHTML = `<div class="section"><div class="container"><h2>Course not found</h2></div></div>`;
        return;
      }
      cid = lookup[0].id;
    }
    const c=await api(`/courses/${cid}`);
    // SEO: canonicalise URL to slug (preserving any active language prefix).
    if (c.slug) {
      const desired = routeToUrl('detail', c.slug);
      if (window.location.pathname !== desired) {
        try { history.replaceState({page:'detail'}, '', desired + window.location.search); } catch(_) {}
      }
    }
    setPageMeta({
      title: c.title + ' — UpskillCompass',
      description: c.short_description || (c.description ? String(c.description).slice(0, 200) : DEFAULT_DESC),
      ogType: 'website'

    const courseUrl = SITE_URL + '/courses/' + (c.slug || cid);
    const courseLd = {
      '@type': 'Course',
      name: c.title,
      description: c.short_description || c.description || '',
      url: courseUrl,
      provider: { '@type': 'Organization', name: 'UpskillCompass', sameAs: SITE_URL + '/' }

    if (c.instructor_name) courseLd.instructor = { '@type': 'Person', name: c.instructor_name };

    const avg=c.avg_rating?Number(c.avg_rating).toFixed(1):'0.0';const disc=c.original_price?Math.round((1-c.price/c.original_price)*100):0;
    app.innerHTML=`

      <div class="breadcrumb"><a onclick="navigate('homepage')">${t('home')}</a> <span>&rsaquo;</span> <a onclick="navigate('catalog')">${t('courses')}</a> <span>&rsaquo;</span> ${esc(c.title)}</div>
      ${c.is_bestseller?`<span class="badge badge-gold" style="margin-bottom:16px;">${t('bestseller')}</span>`:''}
      <h1 style="font-size:36px;max-width:700px;margin-bottom:16px;">${esc(c.title)}</h1>
      <p style="font-size:17px;color:var(--slate-600);max-width:650px;margin-bottom:20px;">${esc(c.short_description||c.description||'')}</p>
      <div class="flex-center" style="gap:16px;margin-bottom:16px;"><div class="avatar" style="width:40px;height:40px;font-size:12px;">${initials(c.instructor_name?.split(' ')[0],c.instructor_name?.split(' ').slice(-1)[0])}</div><span style="font-size:15px;">${t('created_by')} <strong style="color:var(--navy-700);cursor:pointer;" onclick="navigate('instructor',${c.instructor_user_id||c.instructor_id})">${esc(c.instructor_name)}</strong></span></div>
      <div class="flex-center" style="gap:24px;font-size:14px;color:var(--slate-500);">${starsHtml(avg)} <strong style="color:var(--navy-800);">${avg}</strong> (${c.review_count||0} ${t('reviews')}) &bull; ${c.enrollment_count||0} ${t('students_enrolled')} &bull; ${c.level||'Intermediate'} &bull; ${c.format||'Self-paced'}${c.start_date?` &bull; ${t('starts')}: ${new Date(c.start_date).toLocaleDateString()}`:''}</div>

async function handleEnroll(cid, price, title, currency, imageUrl) { if(!state.user){navigate('auth','signin');return;} if(price>0){navigate('checkout',{courseId:cid,price,title,currency:currency||'USD',image_url:imageUrl||''});return;} try{await api('/enrollments',{method:'POST',body:JSON.stringify({course_id:cid})});toast(t('purchase_success'),'success');navigate('my-courses');}catch(e){toast(e.message,'error');} }
async function handleWishlist(cid) { if(!state.user){navigate('auth','signin');return;} try{const r=await api('/wishlist',{method:'POST',body:JSON.stringify({course_id:cid})});toast(r.message,'success');}catch(e){toast(e.message,'error');} }

// Entry point from the discreet "Administrate this course" link on every
// course detail page. Figures out which of five UI states the user is in
// based on session + course claim state, and renders the modal.
//
//   A) not signed in            → positive "this page is here to help"
//   B) signed in, email pending → "confirm your email first"
//   C) signed in + email ok     → already owner       → edit UI
//   D) signed in + email ok     → claimable           → claim button
//   E) signed in + email ok     → not claimable       → support email
function closeAdminModal() {
  const m = document.getElementById('admin-modal');
  if (m) m.remove();
}

// Blocking "check your email" confirmation after signup.
// Rendered as a modal (not an inline alert) so the user must acknowledge it.
// Reuses modal-backdrop / modal-card / alert-success styles — no new CSS.
function closeSignupConfirmModal() {
  const m = document.getElementById('signup-confirm-modal');
  if (m) m.remove();
}
window.closeSignupConfirmModal = closeSignupConfirmModal;
function showSignupConfirmModal(email) {
  closeSignupConfirmModal();
  const el = document.createElement('div');
  el.id = 'signup-confirm-modal';
  el.className = 'modal-backdrop';
  el.innerHTML = `

async function showAdministrate(cid) {
  renderAdminModalShell(
    t('admin_title'),
    `<div class="page-loader" style="min-height:140px;"><div class="loading-spinner"></div></div>`,
    ''
  );
  let course;
  try {
    const rows = await sb(`courses?id=eq.${cid}&select=id,title,slug,source_url,source_domain,claim_email,claimed_auth_id,image_url`);
    course = rows && rows[0];
  } catch (e) { document.getElementById('admin-modal-body').innerHTML = `<p style="color:var(--red-600);">${esc(e.message)}</p>`; return; }
  if (!course) { document.getElementById('admin-modal-body').innerHTML = `<p>Course not found.</p>`; return; }

  // State A: not signed in
  if (!state.session || !state.user) {
    return adminStateSignedOut(course);
  }
  // State B: signed in but email not confirmed
  if (!state.session.user.email_confirmed_at) {
    return adminStatePendingEmail(course);
  }
  // State C: already the owner
  if (course.claimed_auth_id && course.claimed_auth_id === state.session.user.id) {
    return adminStateOwner(course);
  }
  // Not claimable at all if someone else already owns it
  if (course.claimed_auth_id && course.claimed_auth_id !== state.session.user.id) {
    return adminStateUnclaimable(course, 'already_claimed');
  }
  // Check claimability against claim_email and source_domain
  const email  = (state.session.user.email || '').toLowerCase();
  const domain = email.split('@')[1] || '';
  const matchEmail  = course.claim_email   && course.claim_email.toLowerCase()  === email;
  const matchDomain = course.source_domain && course.source_domain.toLowerCase() === domain;
  if (matchEmail || matchDomain) {
    return adminStateClaimable(course, { matchEmail, matchDomain, email, domain });
  }
  return adminStateUnclaimable(course, 'no_match');
}

window.doClaimCourse = async function(cid) {
  const btn = document.getElementById('admin-claim-btn');
  if (btn) { btn.disabled = true; btn.textContent = t('processing'); }
  try {
    await rpc('claim_course', { p_course_id: cid });
    toast(t('admin_claim_success'), 'success');
    // Re-fetch the course so the next render sees claimed_auth_id.
    const rows = await sb(`courses?id=eq.${cid}&select=id,title,slug,source_url,source_domain,claim_email,claimed_auth_id,image_url`);
    const course = rows && rows[0];
    // If the user has more claimable courses in their domain/email, offer them.
    const more = await rpc('list_claimable_in_domain').catch(() => []);
    if (Array.isArray(more) && more.length > 0) {
      adminStateClaimMore(course, more);
    } else {
      adminStateOwner(course);
    }
  } catch (e) {
    const msg = parseRpcError(e);
    document.getElementById('admin-modal-body').innerHTML +=
      `<div class="alert alert-error" style="margin-top:12px;">${esc(msg)}</div>`;
    if (btn) { btn.disabled = false; btn.textContent = t('admin_claim_btn'); }
  }
};

function parseRpcError(err) {
  // PostgREST wraps RAISE EXCEPTION in a JSON body we receive via sb().
  // Try to pull out the human hint, fall back to the raw message.
  try {
    const j = JSON.parse(err.message);
    if (j.hint)    return j.hint;
    if (j.message) return j.message;
  } catch(_) {}
  return err.message || 'Error';
}

window.switchAuthTab=function(tab){document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));document.querySelectorAll('.auth-tabs button').forEach(b=>b.classList.remove('active'));document.getElementById('auth-'+tab).classList.add('active');document.querySelectorAll('.auth-tabs button')[tab==='signin'?0:1].classList.add('active');document.getElementById('auth-alert').innerHTML='';};
window.doSignIn=async function(){
  const btn=document.getElementById('signin-btn');btn.disabled=true;btn.textContent=t('signing_in');
  try{
    const r=await api('/auth/signin',{method:'POST',body:JSON.stringify({email:document.getElementById('si-email').value,password:document.getElementById('si-password').value})});
    if (r.pending_confirmation) {
      document.getElementById('auth-alert').innerHTML=`<div class="alert alert-warn">${t('pending_confirm').replace('{email}', esc(r.email))}</div>`;
      btn.disabled=false;btn.textContent=t('sign_in');return;
    }
    toast(t('welcome')+(state.user&&state.user.first_name?' '+state.user.first_name:'')+'!','success');
    const role=state.user&&state.user.role;
    navigate(role==='instructor'?'dashboard':role==='admin'?'admin':'homepage');
  }catch(e){
    document.getElementById('auth-alert').innerHTML=`<div class="alert alert-error">${esc(e.message)}</div>`;
    btn.disabled=false;btn.textContent=t('sign_in');
  }
};
window.doSignUp=async function(){
  if(document.getElementById('su-pw').value!==document.getElementById('su-pw2').value){
    document.getElementById('auth-alert').innerHTML=`<div class="alert alert-error">${t('pw_mismatch')}</div>`;return;
  }
  const btn=document.getElementById('signup-btn');btn.disabled=true;btn.textContent=t('creating');
  try{
    const r=await api('/auth/signup',{method:'POST',body:JSON.stringify({
      first_name:document.getElementById('su-fn').value,
      last_name:document.getElementById('su-ln').value,
      email:document.getElementById('su-em').value,
      password:document.getElementById('su-pw').value,
      company:document.getElementById('su-co').value
    })});
    if (r.pending_confirmation) {
      state.pendingEmail = r.email;
      showSignupConfirmModal(r.email);
      try { window.umami && umami.track('signup-pending-confirm-shown'); } catch(_){}
      btn.disabled=false;btn.textContent=t('create_account');return;
    }
    try { window.umami && umami.track('signup-success', { role: 'instructor' }); } catch(_){}
    toast(t('welcome')+(state.user&&state.user.first_name?' '+state.user.first_name:'')+'!','success');
    navigate('manage-courses');
  }catch(e){
    document.getElementById('auth-alert').innerHTML=`<div class="alert alert-error">${esc(e.message)}</div>`;
    btn.disabled=false;btn.textContent=t('create_account');
  }
};
