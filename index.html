async function renderManageCourses(app) {
  if(!state.user||state.user.role!=='instructor'){navigate('auth','signin');return;}
  app.innerHTML=`<div class="section" style="padding-top:32px;"><div class="container"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px;"><div><h1 style="font-size:28px;margin-bottom:8px;">${t('manage_courses')}</h1><p style="color:var(--slate-500);">${t('dash_subtitle')}</p></div><div style="display:flex;align-items:center;gap:16px;" id="mc-header-actions"><button class="btn btn-primary" onclick="navigate('course-form')">${t('add_course')}</button></div></div><div id="mc-instructor-list"><div class="page-loader"><div class="loading-spinner"></div></div></div></div></div>`;
  try {
    const courses = await sb(`courses?select=*,categories(name)&instructor_id=eq.${state.user.id}&order=created_at.desc`);
    const courseCount = (courses||[]).length;
    const isPremium = state.user.is_premium;
    const userTier = state.user.premium_tier;
    let limitHtml;
    if (isPremium && userTier === 'premium_pro') limitHtml = `<span style="background:linear-gradient(135deg,#0f0c29,#302b63);color:#ffd700;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;">\uD83D\uDE80 ${t('course_limit_premium_pro')}</span>`;
    else if (isPremium && userTier === 'premium_plus') limitHtml = `<span style="background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;">\uD83D\uDC8E ${t('course_limit_premium_plus')}</span>`;
    else if (isPremium) limitHtml = `<span style="background:linear-gradient(135deg,var(--gold-400),var(--gold-600));color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;">\u2B50 ${t('course_limit_premium')}</span>`;
    else limitHtml = `<span style="background:var(--slate-100);color:var(--slate-700);padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;">${courseCount} / 5 ${t('course_limit_free')}</span>`;
    const headerActions = document.getElementById('mc-header-actions');
    if (headerActions) {
      const atLimit = !isPremium && courseCount >= 5;
      headerActions.innerHTML = limitHtml + (atLimit
        ? `<a class="btn btn-gold" onclick="navigate('premium')" style="cursor:pointer;">${t('premium')} \u2192</a>`
        : `<button class="btn btn-primary" onclick="navigate('course-form')">${t('add_course')}</button>`);
    }
    if (!courses||!courses.length) { document.getElementById('mc-instructor-list').innerHTML=`<div style="text-align:center;padding:60px 0;"><h3 style="margin-bottom:12px;">${t('no_instructor_courses')}</h3><button class="btn btn-primary" onclick="navigate('course-form')">${t('add_course')}</button></div>`; return; }
    // Enrich with enrollment counts
    for (const c of courses) {
      const en = await sb(`enrollments?select=id&course_id=eq.${c.id}`);
      c.enrollment_count = (en||[]).length;
      if (c.categories) c.category_name = c.categories.name;
    }
    document.getElementById('mc-instructor-list').innerHTML=`<table class="data-table"><thead><tr><th>${t('course')}</th><th>${t('category')}</th><th>${t('course_status')}</th><th>${t('price')}</th><th>${t('students')}</th><th>${t('actions')}</th></tr></thead><tbody>${courses.map(c=>`<tr>
      <td><strong>${esc(c.title)}</strong></td>
      <td>${esc(c.category_name||'')}</td>
      <td><span class="status-badge status-${esc(c.status)}">${esc(c.status)}</span></td>
      <td>${fmtPrice(c.price,c.currency)}</td>
      <td>${c.enrollment_count||0}</td>
      <td style="display:flex;gap:8px;">
        <a style="color:var(--navy-700);cursor:pointer;font-weight:500;" onclick="navigate('course-form',{id:${c.id}})">${t('edit')}</a>
        <a style="color:var(--red-600);cursor:pointer;font-weight:500;" onclick="deleteCourse(${c.id})">${t('delete_course')}</a>
      </td></tr>`).join('')}</tbody></table>`;
  } catch(e) { document.getElementById('mc-instructor-list').innerHTML=`<p style="color:var(--red-600);">${esc(e.message)}</p>`; }
}
window.deleteCourse=async function(id){if(!confirm(t('delete_confirm')))return;try{await api(`/instructor/courses/${id}`,{method:'DELETE'});toast(t('course_deleted'),'success');navigate('manage-courses');}catch(e){toast(e.message,'error');}};

async function renderCourseForm(app, data) {
  if(!state.user||state.user.role!=='instructor'){navigate('auth','signin');return;}

  const isEdit = !!courseId;

  try {
    const cats = await sb('categories?select=*&order=name.asc');
    let course = null;
    if (isEdit) {
      const courses = await sb(`courses?select=*&id=eq.${courseId}&instructor_id=eq.${state.user.id}`);
      if (!courses||!courses[0]) { toast('Course not found','error'); navigate('manage-courses'); return; }
      course = courses[0];
    }
    const c = course || {};
    document.getElementById('course-form-content').innerHTML=`
      <div class="form-group"><label>${t('course_title')}</label><input class="input" id="cf-title" value="${esc(c.title||'')}" placeholder="e.g. Leadership Fundamentals"></div>
      <div class="form-group"><label>${t('short_desc')}</label><input class="input" id="cf-short" value="${esc(c.short_description||'')}" placeholder="Brief one-line description"></div>
      <div class="form-group"><label>${t('description_label')}</label><textarea class="input" id="cf-desc" rows="5" placeholder="Full course description...">${esc(c.description||'')}</textarea></div>
      <div class="inline-fields">
        <div class="form-group"><label>${t('category')}</label><select class="input" id="cf-cat">${cats.map(cat=>`<option value="${cat.id}" ${c.category_id==cat.id?'selected':''}>${esc(cat.name)}</option>`).join('')}</select></div>
        <div class="form-group"><label>${t('level')}</label><select class="input" id="cf-level"><option value="beginner" ${c.level==='beginner'?'selected':''}>${t('beginner')}</option><option value="intermediate" ${c.level==='intermediate'||!c.level?'selected':''}>${t('intermediate')}</option><option value="advanced" ${c.level==='advanced'?'selected':''}>${t('advanced')}</option><option value="executive" ${c.level==='executive'?'selected':''}>${t('executive')}</option></select></div>
      </div>
      <div class="inline-fields">
        <div class="form-group"><label>${t('format')}</label><select class="input" id="cf-format"><option value="self-paced" ${c.format==='self-paced'||!c.format?'selected':''}>${t('self_paced')}</option><option value="live" ${c.format==='live'?'selected':''}>${t('live')}</option><option value="hybrid" ${c.format==='hybrid'?'selected':''}>${t('hybrid')}</option></select></div>
        <div class="form-group"><label>${t('duration')}</label><input class="input" id="cf-dur" type="number" min="0" step="0.5" value="${c.duration_hours||0}"></div>
      </div>
      <div class="form-group"><label>${t('image_url')} <span style="color:var(--slate-400);">(${t('optional')})</span></label><input class="input" id="cf-img" value="${esc(c.image_url||'')}" placeholder="https://..."></div>
      <div class="inline-fields">
        <div class="form-group"><label>Language</label><input class="input" id="cf-lang" value="${esc(c.course_language||'')}" placeholder="e.g. English, Swedish"></div>
        <div class="form-group"><label>Currency</label><select class="input" id="cf-currency"><option value="USD" ${c.currency==='USD'||!c.currency?'selected':''}>USD ($)</option><option value="SEK" ${c.currency==='SEK'?'selected':''}>SEK (kr)</option><option value="EUR" ${c.currency==='EUR'?'selected':''}>EUR (\u20AC)</option><option value="GBP" ${c.currency==='GBP'?'selected':''}>GBP (\u00A3)</option></select></div>
      </div>
      <div class="inline-fields">
        <div class="form-group"><label>Delivery</label><select class="input" id="cf-delivery" onchange="document.getElementById('cf-loc-wrap').style.display=this.value==='online'?'none':'block'"><option value="online" ${c.delivery==='online'||!c.delivery?'selected':''}>Online</option><option value="irl" ${c.delivery==='irl'?'selected':''}>IRL (In-person)</option><option value="hybrid" ${c.delivery==='hybrid'?'selected':''}>Hybrid</option></select></div>

      </div>

        <div class="form-group"><label>Timezone / Schedule</label><input class="input" id="cf-tz" value="${esc(c.timezone_info||'')}" placeholder="e.g. CET 9-17"></div>
        <div class="form-group"><label>${t('price')} </label><input class="input" id="cf-price" type="number" min="0" step="1" value="${c.price||0}"></div>
      </div>
      <div class="inline-fields">
        <div class="form-group"><label>${t('start_date')}</label><input class="input" id="cf-start" type="date" value="${c.start_date?c.start_date.slice(0,10):''}"></div>

  } catch(e) { document.getElementById('course-form-content').innerHTML=`<p style="color:var(--red-600);">${esc(e.message)}</p>`; }

window.submitCourse=async function(courseId){
  const btn=document.getElementById('cf-submit');btn.disabled=true;btn.textContent=t('processing');
  const data={title:document.getElementById('cf-title').value,short_description:document.getElementById('cf-short').value,description:document.getElementById('cf-desc').value,category_id:parseInt(document.getElementById('cf-cat').value),level:document.getElementById('cf-level').value,format:document.getElementById('cf-format').value,price:parseFloat(document.getElementById('cf-price').value)||0,duration_hours:parseFloat(document.getElementById('cf-dur').value)||0,image_url:document.getElementById('cf-img').value||null,start_date:document.getElementById('cf-start').value||null,end_date:document.getElementById('cf-end').value||null,course_language:document.getElementById('cf-lang').value||null,currency:document.getElementById('cf-currency').value||'USD',delivery:document.getElementById('cf-delivery').value||'online',location:document.getElementById('cf-location').value||null,timezone_info:document.getElementById('cf-tz').value||null};
  if(courseId){const st=document.getElementById('cf-status');if(st)data.status=st.value;}
  try{
    if(courseId){await api(`/instructor/courses/${courseId}`,{method:'PATCH',body:JSON.stringify(data)});}
    else{await api('/instructor/courses',{method:'POST',body:JSON.stringify(data)});}
    toast(t('course_saved'),'success');navigate('manage-courses');
  }catch(e){toast(e.message,'error');btn.disabled=false;btn.textContent=courseId?t('update_course'):t('create_course');}
};

async function renderPremium(app) {
  if(!state.user||state.user.role!=='instructor'){navigate('auth','signin');return;}
  app.innerHTML=`<div class="section" style="padding-top:32px;"><div class="container" style="max-width:1200px;text-align:center;">

    <div id="premium-content"><div class="page-loader"><div class="loading-spinner"></div></div></div>
  </div></div>`;
  try {
    const ms = await api('/membership/status');
    if (ms.is_premium && ms.premium_expires_at) {
      const exp = new Date(ms.premium_expires_at).toLocaleDateString();
      const tier = ms.premium_tier || 'premium';
      const tierCfg = { premium: { grad:'linear-gradient(135deg,var(--gold-400),var(--gold-600))', icon:'\u2B50', label:t('premium_active') }, premium_plus: { grad:'linear-gradient(135deg,#1a1a2e,#16213e)', icon:'\uD83D\uDC8E', label:t('premium_plus_active') }, premium_pro: { grad:'linear-gradient(135deg,#0f0c29,#302b63,#24243e)', icon:'\uD83D\uDE80', label:t('premium_pro_active') } };
      const cfg = tierCfg[tier] || tierCfg.premium;

          ${feat('premium_feat1')}${feat('premium_feat2')}${feat('premium_feat3')}${feat('premium_feat4')}${feat('premium_feat5')}${feat('premium_feat6')}${feat('premium_feat7')}${feat('premium_feat8')}

window.subscribePremium=async function(tier){try{await api('/membership/subscribe',{method:'POST',body:JSON.stringify({tier})});const labels={premium_pro:t('premium_pro_active'),premium_plus:t('premium_plus_active'),premium:t('premium_active')};toast(labels[tier]||labels.premium,'success');navigate('premium');}catch(e){toast(e.message,'error');}};

async function renderAdmin(app) {
  if(!state.user||state.user.role!=='admin'){navigate('auth','signin');return;}const u=state.user;
  app.innerHTML=`<div class="dashboard-layout"><aside class="dashboard-sidebar"><div class="dash-profile"><div class="avatar-lg" style="margin:0 auto 12px;background:linear-gradient(135deg,var(--gold-500),var(--gold-600));">${initials(u.first_name,u.last_name)}</div><strong style="font-size:16px;">${esc(u.first_name)} ${esc(u.last_name)}</strong><p>${t('administrator')}</p></div><nav>
    <a class="active" id="an-overview" onclick="aTab('overview')">\u{1F4CA} ${t('overview')}</a><a id="an-users" onclick="aTab('users')">\u{1F465} ${t('users')}</a><a id="an-courses" onclick="aTab('courses')">\u{1F4DA} ${t('courses')}</a><a id="an-orders" onclick="aTab('orders')">\u{1F4B0} ${t('orders')}</a><a onclick="navigate('homepage')">\u2190 ${t('back_site')}</a>
  </nav></aside><main class="dashboard-main" id="admin-content"><div class="page-loader"><div class="loading-spinner"></div></div></main></div>`;
  window.aTab=async function(tab){
    document.querySelectorAll('.dashboard-sidebar nav a').forEach(a=>a.classList.remove('active'));const n=document.getElementById('an-'+tab);if(n)n.classList.add('active');
    const m=document.getElementById('admin-content');
    if(tab==='overview'){m.innerHTML='<div class="page-loader"><div class="loading-spinner"></div></div>';try{const[cats,cd]=await Promise.all([api('/categories'),api('/courses?per_page=100')]);const cs=cd.courses||[];const ts=cs.reduce((s,c)=>s+(c.enrollment_count||0),0);const ar=cs.length?(cs.reduce((s,c)=>s+(c.avg_rating||0),0)/cs.length).toFixed(1):'N/A';m.innerHTML=`<h1 style="font-size:26px;margin-bottom:32px;">${t('admin_overview')}</h1><div class="grid-4" style="margin-bottom:32px;"><div class="stat-card" style="border-top:3px solid var(--teal-500);"><div class="stat-label">${t('total_courses')}</div><div class="stat-value">${cs.length}</div></div><div class="stat-card" style="border-top:3px solid var(--navy-500);"><div class="stat-label">${t('total_enrollments')}</div><div class="stat-value">${ts}</div></div><div class="stat-card" style="border-top:3px solid var(--gold-500);"><div class="stat-label">${t('categories_label')}</div><div class="stat-value">${cats.length}</div></div><div class="stat-card" style="border-top:3px solid var(--slate-500);"><div class="stat-label">${t('avg_rating')}</div><div class="stat-value">${ar}</div></div></div><h3 style="font-size:18px;margin-bottom:16px;">${t('categories_label')}</h3><table class="data-table"><thead><tr><th>${t('category')}</th><th>${t('slug')}</th><th>${t('courses')}</th></tr></thead><tbody>${cats.map(c=>`<tr><td><strong>${esc(c.name)}</strong></td><td>${esc(c.slug)}</td><td>${c.course_count}</td></tr>`).join('')}</tbody></table>`;}catch(e){m.innerHTML=`<p style="color:var(--red-600);">${esc(e.message)}</p>`;}}
    else if(tab==='users'){m.innerHTML=`<h1 style="font-size:26px;margin-bottom:32px;">${t('user_mgmt')}</h1><div style="display:flex;gap:12px;margin-bottom:24px;"><input class="input" id="adm-search" placeholder="${t('search_email')}" style="max-width:400px;"><button class="btn btn-primary btn-sm" onclick="admSearch()">${t('search')}</button></div><div id="adm-res"><p style="color:var(--slate-500);">${t('search_email')}</p></div>`;window.admSearch=async function(){const q=document.getElementById('adm-search').value.trim();if(!q)return;try{const r=await api(`/search?q=${encodeURIComponent(q)}`);const ins=r.instructors||[];document.getElementById('adm-res').innerHTML=ins.length?`<table class="data-table"><thead><tr><th>${t('name')}</th><th>ID</th></tr></thead><tbody>${ins.map(i=>`<tr><td>${esc(i.first_name)} ${esc(i.last_name)}</td><td>${i.id}</td></tr>`).join('')}</tbody></table>`:`<p style="color:var(--slate-500);">${t('no_courses')}</p>`;}catch(e){document.getElementById('adm-res').innerHTML=`<p style="color:var(--red-600);">${esc(e.message)}</p>`;}};}
    else if(tab==='courses'){m.innerHTML=`<h1 style="font-size:26px;margin-bottom:32px;">${t('course_mgmt')}</h1><div class="page-loader"><div class="loading-spinner"></div></div>`;try{const d=await api('/courses?per_page=50');const cs=d.courses||[];m.innerHTML=`<h1 style="font-size:26px;margin-bottom:32px;">${t('course_mgmt')}</h1><p style="color:var(--slate-500);margin-bottom:24px;">${cs.length} ${t('published_courses')}</p><table class="data-table"><thead><tr><th>${t('course')}</th><th>${t('instructor')}</th><th>${t('price')}</th><th>${t('students')}</th><th>${t('rating')}</th><th>${t('actions')}</th></tr></thead><tbody>${cs.map(c=>`<tr><td><strong style="cursor:pointer;" onclick="navigate('detail','${js(c.slug || String(c.id))}')">${esc(c.title)}</strong></td><td>${esc(c.instructor_name||'')}</td><td>${fmtPrice(c.price,c.currency)}</td><td>${c.enrollment_count||0}</td><td>${starsHtml(c.avg_rating||0)} ${c.avg_rating?Number(c.avg_rating).toFixed(1):'-'}</td><td><a style="color:var(--navy-700);cursor:pointer;" onclick="navigate('detail','${js(c.slug || String(c.id))}')">${t('view')}</a></td></tr>`).join('')}</tbody></table>`;}catch(e){m.innerHTML=`<p style="color:var(--red-600);">${esc(e.message)}</p>`;}}
    else if(tab==='orders'){m.innerHTML=`<h1 style="font-size:26px;margin-bottom:32px;">${t('orders')}</h1><div class="page-loader"><div class="loading-spinner"></div></div>`;try{const d=await api('/courses?per_page=50');const cs=d.courses||[];const te=cs.reduce((s,c)=>s+(c.enrollment_count||0),0);m.innerHTML=`<h1 style="font-size:26px;margin-bottom:32px;">${t('orders')}</h1><div class="grid-3" style="margin-bottom:32px;"><div class="stat-card" style="border-top:3px solid var(--teal-500);"><div class="stat-label">${t('total_enrollments')}</div><div class="stat-value">${te}</div></div><div class="stat-card" style="border-top:3px solid var(--navy-500);"><div class="stat-label">${t('published_courses')}</div><div class="stat-value">${cs.length}</div></div><div class="stat-card" style="border-top:3px solid var(--gold-500);"><div class="stat-label">${t('avg_price')}</div><div class="stat-value">$${cs.length?Math.round(cs.reduce((s,c)=>s+Number(c.price),0)/cs.length):0}</div></div></div>`;}catch(e){m.innerHTML=`<p style="color:var(--red-600);">${esc(e.message)}</p>`;}}
  };
  aTab('overview');
}

// ============================================================
// INIT
// ============================================================
(async function bootstrap() {
  // 1. Hydrate auth state from supabase-js storage and install listener.
  try { await initAuth(); } catch (e) { console.warn('initAuth failed', e); }

  // 2. Handle the "user just clicked the confirmation email" callback.
  //    Supabase-js reads the hash fragment automatically via detectSessionInUrl,
  //    so by the time we get here state.session is set. All we do is clean up
  //    the URL and show a welcome toast.
  const u = new URL(window.location.href);
  const justConfirmed = u.searchParams.get('confirmed') === '1';
  if (justConfirmed) {
    u.searchParams.delete('confirmed');
    history.replaceState({}, '', u.pathname + (u.searchParams.toString() ? '?' + u.searchParams.toString() : '') + u.hash);
    try { toast(t('email_confirmed'), 'success'); } catch(_) {}
  }

  // 3. Render the first page. After email confirmation, instructors go to
  //    their dashboard; otherwise honour the URL via urlToRoute so deep links
  //    like /courses/<slug> render the right page.
  const role = state.user && state.user.role;
  if (justConfirmed && role === 'instructor') {
    navigate('dashboard', null, { replace: true });
  } else {
    const [p, d] = urlToRoute();
    navigate(p, d, { replace: true });
  }
})();
</script>
